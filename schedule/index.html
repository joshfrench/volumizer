<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kiln Schedule Calculator | Volumizer</title>
<meta name="description" content="Free kiln schedule calculator for glass artists. Define firing segments, calculate stage times, and visualize the firing curve.">
<link rel="stylesheet" href="../theme.css">
<script src="../theme.js"></script>
<style>
  @keyframes fadein {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Table card ────────────────────────────── */
  .table-card {
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 0.75rem;
  }

  .col-header {
    display: grid;
    grid-template-columns: 16px 1fr 1fr 80px 68px 22px;
    gap: 5px;
    padding: 7px 10px;
    background: var(--bg);
    font-size: 10px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    align-items: center;
  }

  .col-header span { display: block; }
  .col-header .h-rate,
  .col-header .h-target,
  .col-header .h-hold,
  .col-header .h-time { text-align: right; }
  .col-header .h-unit { text-transform: none; letter-spacing: 0; opacity: 0.7; }

  /* ── Segment rows ──────────────────────────── */
  .seg-row {
    display: grid;
    grid-template-columns: 16px 1fr 1fr 80px 68px 22px;
    gap: 5px;
    padding: 7px 10px;
    border-top: 0.5px solid var(--border);
    align-items: center;
    animation: fadein 0.2s ease;
  }

  .seg-num {
    font-size: 11px;
    color: var(--text-secondary);
  }

  /* Number inputs shared style */
  .seg-row input {
    width: 100%;
    font-size: 14px;
    padding: 8px 6px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    -webkit-appearance: none;
    -moz-appearance: textfield;
    text-align: right;
  }

  .seg-row input::-webkit-outer-spin-button,
  .seg-row input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  .seg-row input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  .seg-rate { text-align: right; }
  .seg-rate.is-afap { font-style: italic; color: var(--text-secondary); }

  /* Hold h/m pair */
  .hold-pair {
    display: flex;
    gap: 3px;
    margin-left: 16px;
  }
  .hold-pair input {
    flex: 1;
    width: 0;
    min-width: 0;
    text-align: center;
  }

  /* Calculated time cell */
  .seg-time {
    font-size: 12px;
    color: var(--text);
    text-align: right;
    white-space: nowrap;
    line-height: 1.2;
  }

  .est {
    display: block;
    font-size: 9px;
    color: var(--text-secondary);
    text-align: right;
  }

  /* Delete button */
  .del-btn {
    background: none;
    border: none;
    color: var(--danger);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    padding: 0;
    text-align: center;
    -webkit-appearance: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Add segment row ────────────────────────── */
  .add-row {
    padding: 8px 10px;
    border-top: 0.5px solid var(--border);
  }

  .add-btn {
    width: 100%;
    padding: 8px;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    background: none;
    border: 1px dashed var(--accent);
    border-radius: 8px;
    cursor: pointer;
    -webkit-appearance: none;
  }

  /* ── Total time ─────────────────────────────── */
  #total-row {
    display: none;
    justify-content: flex-end;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 1rem;
    padding: 0 2px;
  }

  .total-label {
    font-size: 12px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  #total-value {
    font-size: 22px;
    font-weight: 500;
  }

  /* ── Graph card ─────────────────────────────── */
  #graph-card {
    display: none;
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 1.5rem;
  }

  .graph-label {
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 8px;
  }

  #graph { display: block; width: 100%; height: auto; overflow: hidden; }

  #afap-note {
    display: none;
    font-size: 10px;
    color: var(--text-secondary);
    text-align: right;
    margin: 4px 0 0;
  }

  /* ── Settings modal ──────────────────────────────────────────── */
  .settings-btn {
    position: absolute;
    top: 0;
    right: 0;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: none;
    color: var(--text-secondary);
    cursor: pointer;
    -webkit-appearance: none;
    padding: 0;
  }

  .settings-btn svg {
    width: 20px;
    height: 20px;
  }

  .settings-btn:active {
    color: var(--accent);
  }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(51, 42, 34, 0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.25rem;
    z-index: 100;
  }

  .modal-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    width: 100%;
    max-width: 320px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
  }

  .modal-card h3 {
    font-size: 17px;
    font-weight: 600;
    margin: 0 0 14px;
    color: var(--text);
  }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-top: 0.5px solid var(--border);
    margin-top: 0.5rem;
  }

  .toggle-row label {
    font-size: 15px;
    font-weight: 500;
    margin: 0;
  }

  .settings-unit-toggle {
    display: flex;
    gap: 6px;
  }

  .settings-unit-btn {
    padding: 6px 14px;
    font-size: 14px;
    font-weight: 500;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text-secondary);
    cursor: pointer;
    -webkit-appearance: none;
  }

  .settings-unit-btn.selected {
    border-color: var(--accent);
    background: var(--accent-light);
    color: var(--accent);
  }

  .switch-btn {
    position: relative;
    width: 48px;
    height: 28px;
    flex-shrink: 0;
    border: none;
    padding: 0;
    border-radius: 28px;
    background: var(--border);
    cursor: pointer;
  }

  .switch-btn::before {
    content: "";
    position: absolute;
    height: 22px;
    width: 22px;
    left: 3px;
    top: 3px;
    background: white;
    border-radius: 50%;
    transition: left 0.15s ease;
  }

  .switch-btn.on {
    background: var(--accent);
  }

  .switch-btn.on::before {
    left: 23px;
  }

  .modal-btns {
    display: flex;
    gap: 10px;
  }

  .btn {
    flex: 1;
    padding: 14px;
    font-size: 16px;
    font-weight: 500;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    -webkit-appearance: none;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
  }

  .btn-primary:active {
    opacity: 0.85;
  }

</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Kiln Schedule</h1>
    <button class="settings-btn" id="settings-btn" type="button" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <!-- Segment table -->
  <div class="table-card">
    <div class="col-header">
      <span>#</span>
      <span class="h-rate" id="h-rate">Rate</span>
      <span class="h-target" id="h-target">Temp</span>
      <span class="h-hold">Hold</span>
      <span class="h-time">Segment<br>Time</span>
      <span></span>
    </div>
    <div id="seg-body">
      <!-- rows rendered by JS -->
    </div>
    <div class="add-row">
      <button type="button" class="add-btn" id="add-btn">+ Add segment</button>
    </div>
  </div>

  <!-- Total time -->
  <div id="total-row">
    <span class="total-label">Total</span>
    <span id="total-value"></span>
  </div>

  <!-- Graph -->
  <div id="graph-card">
    <div class="graph-label">Firing Curve</div>
    <svg id="graph" viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg"></svg>
    <p id="afap-note"></p>
  </div>

  <!-- PDF button -->
  <button type="button" class="btn btn-primary" id="pdf-btn" style="display:none;width:100%;margin-bottom:1rem;">Download firing log (PDF)</button>
</div>

<!-- Settings modal -->
<div class="modal-overlay" id="settings-modal" style="display:none" role="dialog" aria-modal="true" aria-labelledby="settings-modal-title">
  <div class="modal-card">
    <h3 id="settings-modal-title">Settings</h3>
    <div class="toggle-row">
      <label>Units</label>
      <div class="settings-unit-toggle">
        <button class="settings-unit-btn" id="unit-f" type="button">°F</button>
        <button class="settings-unit-btn" id="unit-c" type="button">°C</button>
      </div>
    </div>
    <div class="toggle-row">
      <label>High contrast</label>
      <button class="switch-btn" id="hc-toggle" type="button" aria-label="High contrast" aria-pressed="false"></button>
    </div>
    <div class="modal-btns" style="margin-top: 1.25rem;">
      <button class="btn btn-primary" id="settings-done" type="button">Done</button>
    </div>
  </div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const AMBIENT_TEMP = 70;  // °F — assumed starting temperature
const AFAP_RATE    = 300; // °F/hr — fixed estimate for "as fast as possible"

// ── State ──────────────────────────────────────────────────────────────────
let segments = [{ rate: '', target: '', hold: '' }];

// Temperature display unit ('F' | 'C'); internal state is always canonical °F
let tempUnit = 'F';
const SCHED_KEY = 'volumizer_schedule_settings';
try { tempUnit = (JSON.parse(localStorage.getItem(SCHED_KEY)) || {}).tempUnit || 'F'; } catch (_e) {}
function saveSchedSettings() { try { localStorage.setItem(SCHED_KEY, JSON.stringify({ tempUnit })); } catch (_e) {} }
loadFromParam();

// ── Helpers ────────────────────────────────────────────────────────────────
function isAfap(val) {
  const s = String(val).trim().toUpperCase();
  return s === 'AFAP' || s === '9999';
}

function fmtTime(hours) {
  if (!isFinite(hours) || hours <= 0) return '—';
  let h = Math.floor(hours);
  let m = Math.round((hours - h) * 60);
  if (m === 60) { h += 1; m = 0; }
  if (h === 0) return `${m}m`;
  if (m === 0) return `${h}h`;
  return `${h}h ${m}m`;
}

function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// Conversion helpers — calc always stays in canonical °F; display converts at boundary
const fToC = f => (f - 32) * 5 / 9;          // absolute temp (has offset)
const cToF = c => c * 9 / 5 + 32;
const rateFToC = r => r * 5 / 9;             // rate is a delta — no offset
const rateCToF = r => r * 9 / 5;

function dispTarget(fStr) {                   // canonical °F → display-unit string
  const f = parseFloat(fStr); if (isNaN(f)) return '';
  return String(Math.round(tempUnit === 'C' ? fToC(f) : f));
}
function dispRate(fStr) {                     // canonical °F/hr → display-unit string
  if (isAfap(fStr)) return 'AFAP';
  const f = parseFloat(fStr); if (isNaN(f)) return '';
  return String(Math.round(tempUnit === 'C' ? rateFToC(f) : f));
}
function canonTarget(v) {                     // typed display-unit → canonical °F string
  const n = parseFloat(v); if (isNaN(n)) return '';
  return String(tempUnit === 'C' ? cToF(n) : n);
}
function canonRate(v) {                       // typed display-unit rate → canonical °F/hr or 'AFAP'
  const s = String(v).trim().toUpperCase();
  if (s === 'AFAP' || s === '9999') return 'AFAP';
  const n = parseFloat(v); if (isNaN(n)) return '';
  return String(tempUnit === 'C' ? rateCToF(n) : n);
}
function unitLabel()     { return tempUnit === 'C' ? '°C'    : '°F'; }
function rateUnitLabel() { return tempUnit === 'C' ? '°C/HR' : '°F/HR'; }

// ── URL share helpers ──────────────────────────────────────────────────────
function scheduleToParam() {
  const meaningful = segments.filter((s, i) =>
    i === 0 || s.rate !== '' || s.target !== ''
  );
  const parts = meaningful.map(s => {
    const r = isAfap(s.rate) ? 'A' : (s.rate || 'x');
    const t = s.target || 'x';
    const h = s.hold ? String(Math.round(parseFloat(s.hold) * 60)) : '0';
    return `${r},${t},${h}`;
  });
  return tempUnit + ':' + parts.join(':');
}

function loadFromParam() {
  try {
    const param = new URLSearchParams(window.location.search).get('s');
    if (!param) return;
    const tokens = param.split(':');
    if (tokens.length < 2) return;
    const unit = tokens[0] === 'C' ? 'C' : 'F';
    const loaded = tokens.slice(1).map(tok => {
      const [r, t, hm] = tok.split(',');
      const rate   = r === 'A' ? 'AFAP' : (r === 'x' ? '' : r);
      const target = t === 'x' ? '' : t;
      const holdMins = parseInt(hm, 10);
      const hold  = holdMins > 0 ? String(holdMins / 60) : '';
      return { rate, target, hold };
    });
    if (loaded.length === 0) return;
    tempUnit = unit;
    segments = loaded;
  } catch (_e) {}
}

// ── Calculations ───────────────────────────────────────────────────────────
function calcSegments() {
  let cumTime = 0;
  return segments.map((seg, i) => {
    const afap   = isAfap(seg.rate);
    const rate   = afap ? AFAP_RATE : parseFloat(seg.rate);
    const target = parseFloat(seg.target);
    const hold   = parseFloat(seg.hold) || 0;
    const prevTemp = i === 0
      ? AMBIENT_TEMP
      : (prev => isNaN(prev) ? AMBIENT_TEMP : prev)(parseFloat(segments[i - 1].target));

    if (isNaN(target) || isNaN(rate) || rate <= 0) {
      return { rampTime: 0, stageTime: 0, cumTime, isAfap: afap, valid: false };
    }

    const rampTime  = Math.abs(target - prevTemp) / rate;
    const stageTime = rampTime + hold;
    cumTime += stageTime;
    return { rampTime, stageTime, cumTime, isAfap: afap, valid: true };
  });
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const calcs = calcSegments();

  // Table rows
  document.getElementById('seg-body').innerHTML = segments.map((seg, i) => {
    const calc = calcs[i];
    const timeStr = calc.valid ? fmtTime(calc.stageTime) : '—';
    const estSpan = calc.isAfap && calc.valid ? ' <span class="est">est.</span>' : '';
    const rateClass = isAfap(seg.rate) ? ' is-afap' : '';
    const holdDecimal = parseFloat(seg.hold) || 0;
    const holdH = holdDecimal > 0 ? String(Math.floor(holdDecimal)) : '';
    const holdM = holdDecimal > 0 ? String(Math.round((holdDecimal % 1) * 60)) : '';
    return `
      <div class="seg-row" data-index="${i}">
        <span class="seg-num">${i + 1}</span>
        <input class="seg-rate${rateClass}" type="text" inputmode="decimal"
               value="${esc(dispRate(seg.rate))}" data-field="rate" placeholder="${esc(rateUnitLabel())}">
        <input type="number" inputmode="decimal"
               value="${esc(dispTarget(seg.target))}" data-field="target" placeholder="${esc(unitLabel())}">
        <div class="hold-pair">
          <input type="number" inputmode="numeric" min="0" step="1"
                 value="${esc(holdH)}" data-field="holdH" placeholder="h">
          <input type="number" inputmode="numeric" min="0" max="59" step="1"
                 value="${esc(holdM)}" data-field="holdM" placeholder="m">
        </div>
        <div class="seg-time">${timeStr}${estSpan}</div>
        <button type="button" class="del-btn" data-action="delete" data-index="${i}" aria-label="Remove segment ${i + 1}" tabindex="-1">×</button>
      </div>`;
  }).join('');

  // Total time
  const calcsValid = calcs.filter(c => c.valid);
  const totalHours = calcsValid.reduce((s, c) => s + c.stageTime, 0);
  const totalRow   = document.getElementById('total-row');
  if (calcsValid.length > 0 && totalHours > 0) {
    totalRow.style.display = 'flex';
    document.getElementById('total-value').textContent = fmtTime(totalHours);
    document.getElementById('pdf-btn').style.display = 'block';
  } else {
    totalRow.style.display = 'none';
    document.getElementById('pdf-btn').style.display = 'none';
  }

  renderGraph(calcs);
}

// ── Event delegation ───────────────────────────────────────────────────────
const segBody = document.getElementById('seg-body');

// updateCalcs: patch time cells + total + graph without touching input DOM
function updateCalcs() {
  const calcs = calcSegments();

  segments.forEach((_, i) => {
    const calc    = calcs[i];
    const timeStr = calc.valid ? fmtTime(calc.stageTime) : '—';
    const estSpan = calc.isAfap && calc.valid ? '<span class="est">est.</span>' : '';
    const timeEl  = document.querySelector(`.seg-row[data-index="${i}"] .seg-time`);
    if (timeEl) timeEl.innerHTML = timeStr + estSpan;
  });

  const calcsValid = calcs.filter(c => c.valid);
  const totalHours = calcsValid.reduce((s, c) => s + c.stageTime, 0);
  const totalRow   = document.getElementById('total-row');
  if (calcsValid.length > 0 && totalHours > 0) {
    totalRow.style.display = 'flex';
    document.getElementById('total-value').textContent = fmtTime(totalHours);
    document.getElementById('pdf-btn').style.display = 'block';
  } else {
    totalRow.style.display = 'none';
    document.getElementById('pdf-btn').style.display = 'none';
  }

  if (document.activeElement?.dataset?.field !== 'target') renderGraph(calcs);
}

// input: update state; patch calcs without rebuilding input rows
segBody.addEventListener('input', e => {
  const row = e.target.closest('.seg-row');
  if (!row) return;
  const i     = parseInt(row.dataset.index, 10);
  const field = e.target.dataset.field;
  if (!field) return;
  if (field === 'holdH' || field === 'holdM') {
    const h = parseFloat(row.querySelector('[data-field="holdH"]').value) || 0;
    const m = parseFloat(row.querySelector('[data-field="holdM"]').value) || 0;
    const decimal = h + m / 60;
    segments[i].hold = decimal > 0 ? String(decimal) : '';
    updateCalcs();
    return;
  }
  if (field === 'target') {
    segments[i].target = canonTarget(e.target.value);
    updateCalcs();
    return;
  }
  if (field === 'rate') {
    const n = parseFloat(e.target.value);
    if (!isNaN(n) && n > 9999) e.target.value = '9999';
    e.target.classList.toggle('is-afap', isAfap(e.target.value));
  }
  segments[i][field] = e.target.value;
  if (field !== 'rate') updateCalcs();
});

// blur on rate/target: normalize AFAP (rate), trigger graph (target) — never rebuild DOM on blur
segBody.addEventListener('blur', e => {
  if (e.target.dataset.field === 'target') { updateCalcs(); return; }
  if (e.target.dataset.field !== 'rate') return;
  const row = e.target.closest('.seg-row');
  if (!row) return;
  const i = parseInt(row.dataset.index, 10);
  if (i >= segments.length) return;  // element was detached by splice+render — nothing to update
  segments[i].rate = canonRate(e.target.value);
  e.target.value   = dispRate(segments[i].rate);
  e.target.classList.toggle('is-afap', isAfap(segments[i].rate));
  updateCalcs();
}, true /* useCapture — blur doesn't bubble */);

segBody.addEventListener('keydown', e => {
  // Enter on any field: advance to next row, or add one if on the last non-empty row
  if (e.key === 'Enter' && e.target.dataset.field) {
    e.preventDefault();
    const row = e.target.closest('.seg-row');
    if (!row) return;
    const i = parseInt(row.dataset.index, 10);
    const isLastRow = i === segments.length - 1;
    if (!isLastRow) {
      // Not on the bottom row — just focus the next row's rate field
      document.querySelector(`.seg-row[data-index="${i + 1}"] [data-field="rate"]`)?.focus();
    } else {
      // On the bottom row — add a new row only if this row has any data
      const seg = segments[i];
      const isEmpty = seg.rate === '' && seg.target === '' && seg.hold === '';
      if (!isEmpty) {
        segments.push({ rate: '', target: '', hold: '' });
        render();
        requestAnimationFrame(() => {
          const rows = document.querySelectorAll('.seg-row');
          rows[rows.length - 1]?.querySelector('input')?.focus();
        });
      }
    }
    return;
  }

  // Backspace/Delete in an empty field: navigate to previous field
  if (e.key === 'Backspace' || e.key === 'Delete') {
    const field = e.target.dataset.field;
    if (!field || e.target.value !== '') return;
    const row = e.target.closest('.seg-row');
    if (!row) return;
    const i = parseInt(row.dataset.index, 10);
    e.preventDefault();

    const focusAndSelect = el => { el?.focus(); el?.select?.(); };

    if (field === 'target') {
      focusAndSelect(document.querySelector(`.seg-row[data-index="${i}"] [data-field="rate"]`));
    } else if (field === 'holdH') {
      focusAndSelect(document.querySelector(`.seg-row[data-index="${i}"] [data-field="target"]`));
    } else if (field === 'holdM') {
      focusAndSelect(document.querySelector(`.seg-row[data-index="${i}"] [data-field="holdH"]`));
    } else if (field === 'rate') {
      if (i === 0) return;
      const seg = segments[i];
      const deleteRow = seg.rate === '' && seg.target === '' && seg.hold === '' && segments.length > 1;
      if (deleteRow) {
        segments.splice(i, 1);
        render();
        requestAnimationFrame(() => {
          focusAndSelect(document.querySelector(`.seg-row[data-index="${i - 1}"] [data-field="holdM"]`));
        });
      } else {
        focusAndSelect(document.querySelector(`.seg-row[data-index="${i - 1}"] [data-field="holdM"]`));
      }
    }
  }
});

// click: delete
segBody.addEventListener('click', e => {
  if (e.target.dataset.action !== 'delete') return;
  const index = parseInt(e.target.dataset.index, 10);
  if (isNaN(index)) return;
  segments.splice(index, 1);
  if (segments.length === 0) segments.push({ rate: '', target: '', hold: '' });
  render();
});

// add segment
document.getElementById('add-btn').addEventListener('click', () => {
  segments.push({ rate: '', target: '', hold: '' });
  render();
  // scroll new row into view
  const rows = document.querySelectorAll('.seg-row');
  const lastRow = rows[rows.length - 1];
  lastRow?.scrollIntoView({ block: 'nearest' });
  lastRow?.querySelector('[data-field="rate"]')?.focus();
});

// ── Graph ──────────────────────────────────────────────────────────────────
function renderGraph(calcs) {
  const graphCard = document.getElementById('graph-card');
  const svgEl     = document.getElementById('graph');
  const afapNote  = document.getElementById('afap-note');

  const validCalcs = calcs.filter(c => c.valid);
  if (validCalcs.length === 0) {
    graphCard.style.display = 'none';
    return;
  }
  graphCard.style.display = 'block';
  const hasAfap = calcs.some(c => c.isAfap && c.valid);
  afapNote.style.display = hasAfap ? 'block' : 'none';
  if (hasAfap) afapNote.textContent = `AFAP cooling estimated at ${dispRate(String(AFAP_RATE))}${rateUnitLabel()}`;

  // ── SVG coordinate system ─────────────────────────────────────────────
  // viewBox: 0 0 400 160
  // Plot area: x 36–390, y 8–140  (PAD_L=36, PAD_R=10, PAD_T=8, PAD_B=20)
  const PAD_L = 36, PAD_R = 10, PAD_T = 8, PAD_B = 20;
  const W = 400, H = 160;
  const plotW = W - PAD_L - PAD_R;  // 354
  const plotH = H - PAD_T - PAD_B;  // 132

  const totalTime = calcs[calcs.length - 1].cumTime || 1;

  // ── Find peak first (needed to compute yMax before tx/ty) ─────────────
  let peakTemp = 0, peakTime = 0;
  segments.forEach((seg, i) => {
    const calc   = calcs[i];
    if (!calc?.valid) return;
    const target = parseFloat(seg.target) || 0;
    const hold   = parseFloat(seg.hold) || 0;
    if (target > peakTemp) {
      peakTemp = target;
      peakTime = calc.cumTime - hold;
    }
  });

  const yMax = Math.max(peakTemp, AMBIENT_TEMP) * 1.12;
  const yMin = 0;

  const tx = t => PAD_L + (t / totalTime) * plotW;
  const ty = T => (PAD_T + plotH) - ((T - yMin) / (yMax - yMin)) * plotH;

  // ── Build polyline points ──────────────────────────────────────────────
  const pts = [`${tx(0).toFixed(1)},${ty(AMBIENT_TEMP).toFixed(1)}`];
  segments.forEach((seg, i) => {
    const calc   = calcs[i];
    if (!calc?.valid) return;
    const target = parseFloat(seg.target);
    const hold   = parseFloat(seg.hold) || 0;
    const endRamp = calc.cumTime - hold;
    pts.push(`${tx(endRamp).toFixed(1)},${ty(target).toFixed(1)}`);
    if (hold > 0) {
      pts.push(`${tx(calc.cumTime).toFixed(1)},${ty(target).toFixed(1)}`);
    }
  });

  // ── Horizontal grid lines — auto-scaled to the actual y range ───────────
  function niceGridStep(range) {
    const raw = range / 4;
    const mag = Math.pow(10, Math.floor(Math.log10(raw)));
    const n   = raw / mag;
    return n < 1.5 ? mag : n < 3.5 ? 2 * mag : n < 7.5 ? 5 * mag : 10 * mag;
  }
  const gridStep  = niceGridStep(yMax - yMin);
  const gridStart = Math.ceil((yMin + 1) / gridStep) * gridStep;
  const gridLines = [];
  for (let tF = gridStart; tF < yMax; tF += gridStep) {
    const label = tempUnit === 'C' ? `${Math.round(fToC(tF))}°` : `${Math.round(tF)}°`;
    gridLines.push(`
      <line x1="${PAD_L}" y1="${ty(tF).toFixed(1)}" x2="${W - PAD_R}" y2="${ty(tF).toFixed(1)}"
            stroke="var(--border)" stroke-width="0.5" stroke-dasharray="2,3"/>
      <text x="${PAD_L - 4}" y="${(ty(tF) + 3).toFixed(1)}"
            font-size="8" fill="var(--text-secondary)" text-anchor="end">${label}</text>
    `);
  }

  // ── X-axis tick labels at 0%, 25%, 50%, 75%, 100% of total time ───────
  const xTicks = [0, 0.25, 0.5, 0.75, 1.0].map(f => {
    const t    = f * totalTime;
    const label = totalTime < 4 ? `${t.toFixed(1)}h` : `${Math.round(t)}h`;
    const anchor = f === 0 ? 'start' : f === 1.0 ? 'end' : 'middle';
    return `<text x="${tx(t).toFixed(1)}" y="${H - 4}"
                  font-size="8" fill="var(--text-secondary)" text-anchor="${anchor}">${label}</text>`;
  }).join('');

  // ── Peak marker ────────────────────────────────────────────────────────
  const px = tx(peakTime);
  const py = ty(peakTemp);
  // keep label from clipping right edge
  const labelX = Math.min(px + 4, W - PAD_R - 32);
  const peakLabel = `${Math.round(tempUnit === 'C' ? fToC(peakTemp) : peakTemp)}${unitLabel()}`;
  const peakMarker = `
    <circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="3" fill="var(--accent)"/>
    <text x="${labelX.toFixed(1)}" y="${(py - 4).toFixed(1)}"
          font-size="8" fill="var(--accent)" font-weight="500">${peakLabel}</text>
  `;

  // ── Compose SVG ────────────────────────────────────────────────────────
  svgEl.innerHTML = `
    <!-- axes -->
    <line x1="${PAD_L}" y1="${PAD_T}" x2="${PAD_L}" y2="${PAD_T + plotH}"
          stroke="var(--border)" stroke-width="0.5"/>
    <line x1="${PAD_L}" y1="${PAD_T + plotH}" x2="${W - PAD_R}" y2="${PAD_T + plotH}"
          stroke="var(--border)" stroke-width="0.5"/>
    <!-- y-min label -->
    <text x="${PAD_L - 4}" y="${(ty(0) + 3).toFixed(1)}"
          font-size="8" fill="var(--text-secondary)" text-anchor="end">${Math.round(tempUnit === 'C' ? fToC(0) : 0)}°</text>
    <!-- grid lines + y labels -->
    ${gridLines.join('')}
    <!-- x labels -->
    ${xTicks}
    <!-- firing curve -->
    <polyline points="${pts.join(' ')}"
              fill="none" stroke="var(--accent)" stroke-width="2"
              stroke-linejoin="round" stroke-linecap="round"/>
    <!-- peak marker -->
    ${peakMarker}
  `;
}

// ── Settings modal ────────────────────────────────────────────────────────
const settingsBtn   = document.getElementById('settings-btn');
const settingsModal = document.getElementById('settings-modal');
const settingsDone  = document.getElementById('settings-done');
const unitFBtn      = document.getElementById('unit-f');
const unitCBtn      = document.getElementById('unit-c');
const hcToggle      = document.getElementById('hc-toggle');

function openSettings() {
  unitFBtn.classList.toggle('selected', tempUnit === 'F');
  unitCBtn.classList.toggle('selected', tempUnit === 'C');
  hcToggle.classList.toggle('on', Theme.isHighContrast());
  hcToggle.setAttribute('aria-pressed', String(Theme.isHighContrast()));
  settingsModal.style.display = 'flex';
}
function closeSettings() { settingsModal.style.display = 'none'; }

settingsBtn.addEventListener('click', openSettings);
settingsDone.addEventListener('click', closeSettings);
settingsModal.addEventListener('click', e => { if (e.target === settingsModal) closeSettings(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && settingsModal.style.display === 'flex') closeSettings();
});

function updateColHeaders() {
  document.getElementById('h-rate').innerHTML   = `Rate<br><span class="h-unit">${rateUnitLabel()}</span>`;
  document.getElementById('h-target').innerHTML = `Temp<br><span class="h-unit">${unitLabel()}</span>`;
}

function setUnit(u) {
  if (u === tempUnit) return;
  tempUnit = u;
  saveSchedSettings();
  unitFBtn.classList.toggle('selected', tempUnit === 'F');
  unitCBtn.classList.toggle('selected', tempUnit === 'C');
  updateColHeaders();
  render();
}

unitFBtn.addEventListener('click', () => setUnit('F'));
unitCBtn.addEventListener('click', () => setUnit('C'));

hcToggle.addEventListener('click', () => {
  const on = !Theme.isHighContrast();
  Theme.setHighContrast(on);
  hcToggle.classList.toggle('on', on);
  hcToggle.setAttribute('aria-pressed', String(on));
});

updateColHeaders();

// ── PDF generation ────────────────────────────────────────────────────────
let _jspdfPromise = null;

function ensureJsPDF() {
  if (_jspdfPromise) return _jspdfPromise;
  if (window.jspdf)  return (_jspdfPromise = Promise.resolve());
  _jspdfPromise = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload  = resolve;
    s.onerror = () => { _jspdfPromise = null; reject(new Error('offline')); };
    document.head.appendChild(s);
  });
  return _jspdfPromise;
}

let _qriousPromise = null;

function ensureQRious() {
  if (_qriousPromise) return _qriousPromise;
  if (window.QRious) return (_qriousPromise = Promise.resolve());
  _qriousPromise = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js';
    s.onload  = resolve;
    s.onerror = () => { _qriousPromise = null; reject(new Error('offline')); };
    document.head.appendChild(s);
  });
  return _qriousPromise;
}

async function generatePDF() {
  const btn = document.getElementById('pdf-btn');
  btn.disabled = true;
  btn.textContent = 'Generating…';
  try {
    await Promise.all([ensureJsPDF(), ensureQRious()]);
    buildFiringLog(window.jspdf.jsPDF);
  } catch (_e) {
    alert('Could not load the PDF library. Check your internet connection and try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Download firing log (PDF)';
  }
}

function buildFiringLog(jsPDF) {
  const doc = new jsPDF({ unit: 'pt', format: 'letter' });

  // ── Colors ──────────────────────────────────────────────────────────────
  const INK          = [0x2b, 0x2b, 0x2b];
  const ACCENT       = [0xb5, 0x56, 0x2f];
  const FAINT        = [0xc9, 0xc2, 0xbb];
  const DOT          = [0xa3, 0x9a, 0x8f];
  const HEADER_FILL  = [0xf3, 0xe9, 0xe1];
  const GREY         = [0x8a, 0x85, 0x80];
  const BORDER_LIGHT = [0xb8, 0xb1, 0xa9];
  const DARK_TEXT    = [0x1e, 0x1e, 0x1e];

  // ── Page geometry (mirrors build_firing_log.py constants) ───────────────
  const PAGE_W = 612, PAGE_H = 792;
  const MARGIN_TOP = 46, MARGIN_BOTTOM = 32, MARGIN_LEFT = 45, MARGIN_RIGHT = 32;
  const CONTENT_W = PAGE_W - MARGIN_LEFT - MARGIN_RIGHT;  // 535
  const LEFT = MARGIN_LEFT;   // 45
  const RIGHT = PAGE_W - MARGIN_RIGHT;  // 580

  // ── Drawing helpers (jsPDF is top-down; y grows downward) ───────────────
  function stroke([r, g, b], lw) { doc.setDrawColor(r, g, b); doc.setLineWidth(lw); }
  function fill([r, g, b])       { doc.setFillColor(r, g, b); }
  function ink([r, g, b])        { doc.setTextColor(r, g, b); }

  function hline(x1, x2, y, color = FAINT, lw = 0.6) {
    stroke(color, lw); doc.line(x1, y, x2, y);
  }
  function vline(x, y1, y2, color = BORDER_LIGHT, lw = 0.6) {
    stroke(color, lw); doc.line(x, y1, x, y2);
  }
  function box(x, y, w, h, color = BORDER_LIGHT, lw = 0.6) {
    stroke(color, lw); doc.rect(x, y, w, h, 'S');
  }
  function dotGrid(x1, x2, yTop, yBottom, spacing = 13) {
    fill(DOT);
    for (let y = yTop; y < yBottom; y += spacing)
      for (let x = x1; x <= x2; x += spacing)
        doc.circle(x, y, 0.55, 'F');
  }
  function sectionHeader(y, text, note = null) {
    doc.setFont('helvetica', 'bold'); doc.setFontSize(9); ink(ACCENT);
    doc.text(text.toUpperCase(), LEFT, y + 8);
    if (note) {
      const headerWidth = doc.getTextWidth(text.toUpperCase());
      doc.setFont('helvetica', 'italic'); doc.setFontSize(7.5); ink(GREY);
      doc.text(note, LEFT + headerWidth + 5, y + 8);
    }
    hline(LEFT, RIGHT, y + 12, ACCENT, 1);
    return y + 12;
  }

  let curY = MARGIN_TOP;

  // ── HEADER STRIP ─────────────────────────────────────────────────────────
  const row1_h = 32, row2_h = 22, strip_h = row1_h + row2_h;
  const shared_w = Math.round((182 + 138) / 2);  // 160
  const proj_w = CONTENT_W - shared_w;           // 375

  box(LEFT, curY, CONTENT_W, strip_h);
  hline(LEFT, RIGHT, curY + row1_h);

  doc.setFont('helvetica', 'bold'); doc.setFontSize(6.5); ink(ACCENT);
  doc.text('PROJECT', LEFT + 5, curY + 10);
  doc.text('DATE', LEFT + proj_w + 5, curY + 10);
  vline(LEFT + proj_w, curY, curY + row1_h);

  const row2Top = curY + row1_h;
  const other_w = (CONTENT_W - shared_w) / 3;  // 125
  const r2ws = [other_w, other_w, other_w, shared_w];
  ['KILN', 'PROGRAM #', 'FIRING #', 'START TIME'].forEach((label, idx) => {
    const x = LEFT + r2ws.slice(0, idx).reduce((a, b) => a + b, 0);
    doc.setFont('helvetica', 'bold'); doc.setFontSize(6.5); ink(ACCENT);
    doc.text(label, x + 5, row2Top + 10);
    if (idx > 0) vline(x, row2Top, curY + strip_h);
  });

  curY += strip_h + 9;

  // ── PIECE & MATERIALS ─────────────────────────────────────────────────────
  curY = sectionHeader(curY, 'Piece & Materials') + 4;
  const label_w = 135, pm_row_h = 21;
  const pmFields = [
    { label: 'Description', lines: 1 },
    { label: 'Glass Dimensions', lines: 1 },
    { label: 'Glass used (style / color / batch)', lines: 2 },
    { label: 'Mold Type & Dimensions', lines: 2 },
  ];
  pmFields.forEach(({ label, lines }) => {
    const baseline = curY + 14;
    doc.setFont('helvetica', 'normal'); doc.setFontSize(8.5); ink(DARK_TEXT);
    doc.text(label + ':', LEFT, baseline);
    hline(LEFT + label_w, RIGHT, baseline + 2);
    if (lines > 1) {
      hline(LEFT + label_w, RIGHT, baseline + 2 + pm_row_h);
      curY += pm_row_h * 2;
    } else {
      curY += pm_row_h;
    }
  });
  curY += 5;

  // ── GOALS ────────────────────────────────────────────────────────────────
  curY = sectionHeader(curY, 'Goals') + 16;
  dotGrid(LEFT, RIGHT, curY, curY + 39);
  curY += 44;

  // ── KILN PREP ─────────────────────────────────────────────────────────────
  curY = sectionHeader(curY, 'Kiln Prep', 'shelf, release, position, etc.') + 16;
  dotGrid(LEFT, RIGHT, curY, curY + 65);
  curY += 70;

  // ── FIRING SCHEDULE ───────────────────────────────────────────────────────
  curY = sectionHeader(curY, 'Firing Schedule') + 4;

  const col_widths = [20, 55, 55, 55, 55];
  col_widths.push(CONTENT_W - col_widths.reduce((a, b) => a + b, 0));  // 295 for Notes
  const headers = ['#', `RATE\n${rateUnitLabel()}`, `TARGET\n${unitLabel()}`, 'HOLD', 'SEGMENT\nTIME', 'NOTES'];
  const N_DATA = 9;     // writable rows
  const N_ROWS = 10;    // 9 data + 1 total footer
  const header_h = 20, row_h = 18;
  const table_h = header_h + N_ROWS * row_h;
  const table_top = curY;

  // Header background + text
  fill(HEADER_FILL);
  doc.rect(LEFT, table_top, CONTENT_W, header_h, 'F');
  let hx = LEFT;
  headers.forEach((label, idx) => {
    doc.setFont('helvetica', 'bold'); doc.setFontSize(6.3); ink(ACCENT);
    let ty = table_top + 8;
    label.split('\n').forEach(ln => { doc.text(ln, hx + 3, ty); ty += 6.5; });
    hx += col_widths[idx];
  });

  // Outer box + header divider
  box(LEFT, table_top, CONTENT_W, table_h);
  hline(LEFT, RIGHT, table_top + header_h);

  // Column dividers (full table height)
  let dvx = LEFT;
  col_widths.slice(0, -1).forEach(w => {
    dvx += w;
    vline(dvx, table_top, table_top + table_h);
  });

  // Data rows 1–11
  const calcs = calcSegments();
  let ry = table_top + header_h;
  for (let i = 0; i < N_DATA; i++) {
    hline(LEFT, RIGHT, ry, FAINT, 0.5);
    doc.setFont('helvetica', 'normal'); doc.setFontSize(6.5); ink(GREY);
    doc.text(String(i + 1), LEFT + col_widths[0] / 2, ry + row_h - 6, { align: 'center' });

    if (i < segments.length && calcs[i] && calcs[i].valid) {
      const seg  = segments[i];
      const calc = calcs[i];
      doc.setFont('helvetica', 'normal'); doc.setFontSize(8); ink(INK);

      const c0x = LEFT + col_widths[0];
      doc.text(dispRate(seg.rate),   c0x + col_widths[1] - 3, ry + row_h - 6, { align: 'right' });
      doc.text(dispTarget(seg.target), c0x + col_widths[1] + col_widths[2] - 3, ry + row_h - 6, { align: 'right' });

      const holdDecimal = parseFloat(seg.hold) || 0;
      if (holdDecimal > 0) {
        const holdCX = c0x + col_widths[1] + col_widths[2] + col_widths[3] / 2;
        doc.text(fmtTime(holdDecimal), holdCX, ry + row_h - 6, { align: 'center' });
      }

      const timeX = c0x + col_widths[1] + col_widths[2] + col_widths[3] + col_widths[4] - 3;
      const timeStr = fmtTime(calc.stageTime) + (calc.isAfap ? ' est.' : '');
      doc.text(timeStr, timeX, ry + row_h - 6, { align: 'right' });
    }
    ry += row_h;
  }

  // Footer row — TOTAL (filled background, heavier top rule)
  hline(LEFT, RIGHT, ry, BORDER_LIGHT, 0.6);
  fill(HEADER_FILL);
  doc.rect(LEFT, ry, CONTENT_W, row_h, 'F');

  const validCalcs = calcs.filter(c => c.valid);
  const totalHrs   = validCalcs.reduce((s, c) => s + c.stageTime, 0);
  const segTimeLeft = LEFT + col_widths[0] + col_widths[1] + col_widths[2] + col_widths[3];
  const segTimeRight = segTimeLeft + col_widths[4];

  // "TOTAL" right-aligned in the HOLD column (left of the divider), value in SEGMENT TIME
  doc.setFont('helvetica', 'bold'); doc.setFontSize(6.3); ink(ACCENT);
  doc.text('TOTAL', segTimeLeft - 3, ry + row_h - 6, { align: 'right' });

  doc.setFont('helvetica', 'bold'); doc.setFontSize(9); ink(INK);
  doc.text(fmtTime(totalHrs), segTimeRight - 3, ry + row_h - 5, { align: 'right' });

  curY = table_top + table_h + 10;

  // ── RESULTS & NOTES ───────────────────────────────────────────────────────
  curY = sectionHeader(curY, 'Results & Notes') + 10;
  dotGrid(LEFT, RIGHT, curY, PAGE_H - MARGIN_BOTTOM);

  // ── Save ──────────────────────────────────────────────────────────────────
  const today = new Date().toISOString().split('T')[0];
  doc.save(`firing-log-${today}.pdf`);
}

document.getElementById('pdf-btn').addEventListener('click', generatePDF);
</script>
