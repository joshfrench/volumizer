<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kiln Schedule Calculator | Volumizer</title>
<meta name="description" content="Free kiln schedule calculator for glass artists. Define firing segments, calculate stage times, and visualize the firing curve.">
<link rel="stylesheet" href="../theme.css">
<style>
  @keyframes fadein {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Table card ────────────────────────────── */
  .table-card {
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 0.75rem;
  }

  .col-header {
    display: grid;
    grid-template-columns: 16px 1fr 1fr 1fr 54px 58px 22px;
    gap: 5px;
    padding: 7px 10px;
    background: var(--bg);
    font-size: 10px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    align-items: center;
  }

  .col-header span { display: block; }
  .col-header .h-rate,
  .col-header .h-target,
  .col-header .h-hold,
  .col-header .h-time { text-align: right; }

  /* ── Segment rows ──────────────────────────── */
  .seg-row {
    display: grid;
    grid-template-columns: 16px 1fr 1fr 1fr 54px 58px 22px;
    gap: 5px;
    padding: 7px 10px;
    border-top: 0.5px solid var(--border);
    align-items: center;
    animation: fadein 0.2s ease;
  }

  .seg-num {
    font-size: 11px;
    color: var(--text-secondary);
  }

  /* ── Inline notes expansion ─────────────────── */
  .seg-notes {
    padding: 6px 10px 10px;
    border-top: 0.5px solid var(--border);
    background: var(--bg);
  }

  .seg-notes textarea {
    width: 100%;
    font-size: 14px;
    font-family: inherit;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
    resize: none;
    height: 72px;
    -webkit-appearance: none;
    box-sizing: border-box;
  }

  .seg-notes textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  .seg-notes-done {
    display: block;
    width: 100%;
    margin-top: 6px;
    padding: 7px;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    -webkit-appearance: none;
  }

  /* Number inputs shared style */
  .seg-row input {
    width: 100%;
    font-size: 14px;
    padding: 8px 6px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    -webkit-appearance: none;
    -moz-appearance: textfield;
    text-align: right;
  }

  .seg-row input::-webkit-outer-spin-button,
  .seg-row input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  .seg-row input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  .seg-rate { text-align: right; }
  .seg-rate.is-afap { font-style: italic; color: var(--text-secondary); }

  /* Calculated time cell */
  .seg-time {
    font-size: 12px;
    color: var(--text);
    text-align: right;
    white-space: nowrap;
    line-height: 1.2;
  }

  .est {
    display: block;
    font-size: 9px;
    color: var(--text-secondary);
    text-align: right;
  }

  /* Note disclosure button */
  .note-btn {
    width: 100%;
    font-size: 11px;
    font-family: inherit;
    color: var(--text-secondary);
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 5px;
    cursor: pointer;
    white-space: nowrap;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
  }

  .note-btn.has-notes {
    color: var(--text);
    border-color: var(--text-secondary);
  }

  /* Delete button */
  .del-btn {
    background: none;
    border: none;
    color: var(--danger);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    padding: 0;
    text-align: center;
    -webkit-appearance: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Add segment row ────────────────────────── */
  .add-row {
    padding: 8px 10px;
    border-top: 0.5px solid var(--border);
  }

  .add-btn {
    width: 100%;
    padding: 8px;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    background: none;
    border: 1px dashed var(--accent);
    border-radius: 8px;
    cursor: pointer;
    -webkit-appearance: none;
  }

  /* ── Total time ─────────────────────────────── */
  #total-row {
    display: none;
    justify-content: flex-end;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 1rem;
    padding: 0 2px;
  }

  .total-label {
    font-size: 12px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  #total-value {
    font-size: 22px;
    font-weight: 500;
  }

  /* ── Graph card ─────────────────────────────── */
  #graph-card {
    display: none;
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 1.5rem;
  }

  .graph-label {
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 8px;
  }

  #graph { display: block; width: 100%; height: auto; overflow: hidden; }

  #afap-note {
    display: none;
    font-size: 10px;
    color: var(--text-secondary);
    text-align: right;
    margin: 4px 0 0;
  }

</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Kiln Schedule</h1>
  </header>

  <!-- Segment table -->
  <div class="table-card">
    <div class="col-header">
      <span>#</span>
      <span class="h-rate">Rate</span>
      <span class="h-target">Target</span>
      <span class="h-hold">Hold</span>
      <span class="h-time">Time</span>
      <span></span>
      <span></span>
    </div>
    <div id="seg-body">
      <!-- rows rendered by JS -->
    </div>
    <div class="add-row">
      <button type="button" class="add-btn" id="add-btn">+ Add segment</button>
    </div>
  </div>

  <!-- Total time -->
  <div id="total-row">
    <span class="total-label">Total</span>
    <span id="total-value"></span>
  </div>

  <!-- Graph -->
  <div id="graph-card">
    <div class="graph-label">Firing Curve</div>
    <svg id="graph" viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg"></svg>
    <p id="afap-note">AFAP cooling estimated at 300°F/hr</p>
  </div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const AMBIENT_TEMP = 70;  // °F — assumed starting temperature
const AFAP_RATE    = 300; // °F/hr — fixed estimate for "as fast as possible"

// ── State ──────────────────────────────────────────────────────────────────
let segments = [{ rate: '', target: '', hold: '', notes: '' }];
let expandedIndex    = -1;
let lastFocusedField = null; // { index, field } — updated on every input focus

// ── Helpers ────────────────────────────────────────────────────────────────
function isAfap(val) {
  const s = String(val).trim().toUpperCase();
  return s === 'AFAP' || s === '9999';
}

function fmtTime(hours) {
  if (!isFinite(hours) || hours <= 0) return '—';
  let h = Math.floor(hours);
  let m = Math.round((hours - h) * 60);
  if (m === 60) { h += 1; m = 0; }
  if (h === 0) return `${m}m`;
  if (m === 0) return `${h}h`;
  return `${h}h ${m}m`;
}

function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── Calculations ───────────────────────────────────────────────────────────
function calcSegments() {
  let cumTime = 0;
  return segments.map((seg, i) => {
    const afap   = isAfap(seg.rate);
    const rate   = afap ? AFAP_RATE : parseFloat(seg.rate);
    const target = parseFloat(seg.target);
    const hold   = parseFloat(seg.hold) || 0;
    const prevTemp = i === 0
      ? AMBIENT_TEMP
      : (prev => isNaN(prev) ? AMBIENT_TEMP : prev)(parseFloat(segments[i - 1].target));

    if (isNaN(target) || isNaN(rate) || rate <= 0) {
      return { rampTime: 0, stageTime: 0, cumTime, isAfap: afap, valid: false };
    }

    const rampTime  = Math.abs(target - prevTemp) / rate;
    const stageTime = rampTime + hold;
    cumTime += stageTime;
    return { rampTime, stageTime, cumTime, isAfap: afap, valid: true };
  });
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const calcs = calcSegments();

  // Table rows
  document.getElementById('seg-body').innerHTML = segments.map((seg, i) => {
    const calc = calcs[i];
    const timeStr = calc.valid ? fmtTime(calc.stageTime) : '—';
    const estSpan = calc.isAfap && calc.valid ? ' <span class="est">est.</span>' : '';
    const rateClass = isAfap(seg.rate) ? ' is-afap' : '';
    const isExpanded = expandedIndex === i;
    const caret   = isExpanded ? '▲' : '▼';
    const noteBtn = `<button type="button" class="note-btn${seg.notes ? ' has-notes' : ''}" data-action="note" data-index="${i}" tabindex="-1">Notes ${caret}</button>`;
    const notesRow = isExpanded ? `
      <div class="seg-notes" data-index="${i}">
        <textarea data-action="notes-input" data-index="${i}" placeholder="Notes…">${esc(seg.notes)}</textarea>
        <button type="button" class="seg-notes-done" data-action="collapse" data-index="${i}">Done</button>
      </div>` : '';

    return `
      <div class="seg-row" data-index="${i}">
        <span class="seg-num">${i + 1}</span>
        <input class="seg-rate${rateClass}" type="text" inputmode="decimal"
               value="${esc(seg.rate)}" data-field="rate" placeholder="°F/hr">
        <input type="number" inputmode="decimal"
               value="${esc(seg.target)}" data-field="target" placeholder="°F">
        <input type="number" inputmode="decimal"
               value="${esc(seg.hold)}" data-field="hold" placeholder="h">
        <div class="seg-time">${timeStr}${estSpan}</div>
        ${noteBtn}
        <button type="button" class="del-btn" data-action="delete" data-index="${i}" aria-label="Remove segment ${i + 1}" tabindex="-1">×</button>
      </div>
      ${notesRow}`;
  }).join('');

  // Total time
  const calcsValid = calcs.filter(c => c.valid);
  const totalHours = calcsValid.reduce((s, c) => s + c.stageTime, 0);
  const totalRow   = document.getElementById('total-row');
  if (calcsValid.length > 0 && totalHours > 0) {
    totalRow.style.display = 'flex';
    document.getElementById('total-value').textContent = fmtTime(totalHours);
  } else {
    totalRow.style.display = 'none';
  }

  renderGraph(calcs);
}

// ── Event delegation ───────────────────────────────────────────────────────
const segBody = document.getElementById('seg-body');

// updateCalcs: patch time cells + total + graph without touching input DOM
function updateCalcs() {
  const calcs = calcSegments();

  segments.forEach((_, i) => {
    const calc    = calcs[i];
    const timeStr = calc.valid ? fmtTime(calc.stageTime) : '—';
    const estSpan = calc.isAfap && calc.valid ? '<span class="est">est.</span>' : '';
    const timeEl  = document.querySelector(`.seg-row[data-index="${i}"] .seg-time`);
    if (timeEl) timeEl.innerHTML = timeStr + estSpan;
  });

  const calcsValid = calcs.filter(c => c.valid);
  const totalHours = calcsValid.reduce((s, c) => s + c.stageTime, 0);
  const totalRow   = document.getElementById('total-row');
  if (calcsValid.length > 0 && totalHours > 0) {
    totalRow.style.display = 'flex';
    document.getElementById('total-value').textContent = fmtTime(totalHours);
  } else {
    totalRow.style.display = 'none';
  }

  if (document.activeElement?.dataset?.field !== 'target') renderGraph(calcs);
}

// Track last focused input field so Notes collapse can restore it
segBody.addEventListener('focus', e => {
  const row = e.target.closest('.seg-row');
  if (!row || !e.target.dataset.field) return;
  lastFocusedField = { index: parseInt(row.dataset.index, 10), field: e.target.dataset.field };
}, true /* useCapture — focus doesn't bubble */);

// input: update state; patch calcs without rebuilding input rows
segBody.addEventListener('input', e => {
  if (e.target.dataset.action === 'notes-input') {
    const i = parseInt(e.target.dataset.index, 10);
    segments[i].notes = e.target.value;
    return;
  }
  const row = e.target.closest('.seg-row');
  if (!row) return;
  const i     = parseInt(row.dataset.index, 10);
  const field = e.target.dataset.field;
  if (!field) return;
  segments[i][field] = e.target.value;
  if (field !== 'rate') updateCalcs();
});

// blur on rate/target: normalize AFAP (rate), trigger graph (target) — never rebuild DOM on blur
segBody.addEventListener('blur', e => {
  if (e.target.dataset.field === 'target') { updateCalcs(); return; }
  if (e.target.dataset.field !== 'rate') return;
  const row = e.target.closest('.seg-row');
  if (!row) return;
  const i          = parseInt(row.dataset.index, 10);
  const val        = e.target.value.trim().toUpperCase();
  const normalized = (val === 'AFAP' || val === '9999') ? 'AFAP' : e.target.value;
  segments[i].rate = normalized;
  e.target.value   = normalized;
  e.target.classList.toggle('is-afap', isAfap(normalized));
  updateCalcs();
}, true /* useCapture — blur doesn't bubble */);

segBody.addEventListener('keydown', e => {
  // Enter on hold: add segment and focus new row's rate field
  if (e.key === 'Enter' && e.target.dataset.field === 'hold') {
    e.preventDefault();
    segments.push({ rate: '', target: '', hold: '', notes: '' });
    render();
    const rows = document.querySelectorAll('.seg-row');
    rows[rows.length - 1]?.querySelector('input')?.focus();
    return;
  }

  // Backspace/Delete in an empty field: navigate to previous field
  if (e.key === 'Backspace' || e.key === 'Delete') {
    const field = e.target.dataset.field;
    if (!field || e.target.value !== '') return;
    const row = e.target.closest('.seg-row');
    if (!row) return;
    const i = parseInt(row.dataset.index, 10);
    e.preventDefault();

    if (field === 'target') {
      document.querySelector(`.seg-row[data-index="${i}"] [data-field="rate"]`)?.focus();
    } else if (field === 'hold') {
      document.querySelector(`.seg-row[data-index="${i}"] [data-field="target"]`)?.focus();
    } else if (field === 'rate') {
      if (i === 0) return;
      const seg = segments[i];
      const deleteRow = seg.rate === '' && seg.target === '' && seg.hold === '' && segments.length > 1;
      if (deleteRow) {
        if (expandedIndex === i) expandedIndex = -1;
        else if (expandedIndex > i) expandedIndex--;
        segments.splice(i, 1);
        render();
      }
      document.querySelector(`.seg-row[data-index="${i - 1}"] [data-field="hold"]`)?.focus();
    }
  }
});

// click: delete or open notes
segBody.addEventListener('click', e => {
  const action = e.target.dataset.action || e.target.closest('[data-action]')?.dataset.action;
  const index  = parseInt(
    e.target.dataset.index ?? e.target.closest('[data-index]')?.dataset.index, 10
  );
  if (isNaN(index)) return;

  if (action === 'delete') {
    if (expandedIndex === index) expandedIndex = -1;
    else if (expandedIndex > index) expandedIndex--;
    segments.splice(index, 1);
    if (segments.length === 0) {
      segments.push({ rate: '', target: '', hold: '', notes: '' });
    }
    render();
  } else if (action === 'note') {
    if (expandedIndex === index) {
      collapseNotes();
    } else {
      expandedIndex = index;
      render();
      document.querySelector(`.seg-notes[data-index="${index}"] textarea`)?.focus();
    }
  } else if (action === 'collapse') {
    collapseNotes();
  }
});

// add segment
document.getElementById('add-btn').addEventListener('click', () => {
  segments.push({ rate: '', target: '', hold: '', notes: '' });
  render();
  // scroll new row into view
  const rows = document.querySelectorAll('.seg-row');
  const lastRow = rows[rows.length - 1];
  lastRow?.scrollIntoView({ block: 'nearest' });
  lastRow?.querySelector('[data-field="rate"]')?.focus();
});

function collapseNotes() {
  expandedIndex = -1;
  render();
  if (lastFocusedField) {
    const { index, field } = lastFocusedField;
    document.querySelector(`.seg-row[data-index="${index}"] [data-field="${field}"]`)?.focus();
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && expandedIndex >= 0) collapseNotes();
});

// ── Graph ──────────────────────────────────────────────────────────────────
function renderGraph(calcs) {
  const graphCard = document.getElementById('graph-card');
  const svgEl     = document.getElementById('graph');
  const afapNote  = document.getElementById('afap-note');

  const validCalcs = calcs.filter(c => c.valid);
  if (validCalcs.length === 0) {
    graphCard.style.display = 'none';
    return;
  }
  graphCard.style.display = 'block';
  afapNote.style.display  = calcs.some(c => c.isAfap && c.valid) ? 'block' : 'none';

  // ── SVG coordinate system ─────────────────────────────────────────────
  // viewBox: 0 0 400 160
  // Plot area: x 36–390, y 8–140  (PAD_L=36, PAD_R=10, PAD_T=8, PAD_B=20)
  const PAD_L = 36, PAD_R = 10, PAD_T = 8, PAD_B = 20;
  const W = 400, H = 160;
  const plotW = W - PAD_L - PAD_R;  // 354
  const plotH = H - PAD_T - PAD_B;  // 132

  const totalTime = calcs[calcs.length - 1].cumTime || 1;

  // ── Find peak first (needed to compute yMax before tx/ty) ─────────────
  let peakTemp = 0, peakTime = 0;
  segments.forEach((seg, i) => {
    const calc   = calcs[i];
    if (!calc?.valid) return;
    const target = parseFloat(seg.target) || 0;
    const hold   = parseFloat(seg.hold) || 0;
    if (target > peakTemp) {
      peakTemp = target;
      peakTime = calc.cumTime - hold;
    }
  });

  const yMax = Math.max(peakTemp, AMBIENT_TEMP) * 1.12;
  const yMin = 0;

  const tx = t => PAD_L + (t / totalTime) * plotW;
  const ty = T => (PAD_T + plotH) - ((T - yMin) / (yMax - yMin)) * plotH;

  // ── Build polyline points ──────────────────────────────────────────────
  const pts = [`${tx(0).toFixed(1)},${ty(AMBIENT_TEMP).toFixed(1)}`];
  segments.forEach((seg, i) => {
    const calc   = calcs[i];
    if (!calc?.valid) return;
    const target = parseFloat(seg.target);
    const hold   = parseFloat(seg.hold) || 0;
    const endRamp = calc.cumTime - hold;
    pts.push(`${tx(endRamp).toFixed(1)},${ty(target).toFixed(1)}`);
    if (hold > 0) {
      pts.push(`${tx(calc.cumTime).toFixed(1)},${ty(target).toFixed(1)}`);
    }
  });

  // ── Horizontal grid lines at 500°, 1000°, 1500° ──────────────────────
  const gridLines = [500, 1000, 1500]
    .filter(t => t > yMin && t < yMax)
    .map(t => `
      <line x1="${PAD_L}" y1="${ty(t).toFixed(1)}" x2="${W - PAD_R}" y2="${ty(t).toFixed(1)}"
            stroke="var(--border)" stroke-width="0.5" stroke-dasharray="2,3"/>
      <text x="${PAD_L - 4}" y="${(ty(t) + 3).toFixed(1)}"
            font-size="8" fill="var(--text-secondary)" text-anchor="end">${t}°</text>
    `).join('');

  // ── X-axis tick labels at 0%, 25%, 50%, 75%, 100% of total time ───────
  const xTicks = [0, 0.25, 0.5, 0.75, 1.0].map(f => {
    const t    = f * totalTime;
    const label = totalTime < 4 ? `${t.toFixed(1)}h` : `${Math.round(t)}h`;
    const anchor = f === 0 ? 'start' : f === 1.0 ? 'end' : 'middle';
    return `<text x="${tx(t).toFixed(1)}" y="${H - 4}"
                  font-size="8" fill="var(--text-secondary)" text-anchor="${anchor}">${label}</text>`;
  }).join('');

  // ── Peak marker ────────────────────────────────────────────────────────
  const px = tx(peakTime);
  const py = ty(peakTemp);
  // keep label from clipping right edge
  const labelX = Math.min(px + 4, W - PAD_R - 32);
  const peakMarker = `
    <circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="3" fill="var(--accent)"/>
    <text x="${labelX.toFixed(1)}" y="${(py - 4).toFixed(1)}"
          font-size="8" fill="var(--accent)" font-weight="500">${Math.round(peakTemp)}°F</text>
  `;

  // ── Compose SVG ────────────────────────────────────────────────────────
  svgEl.innerHTML = `
    <!-- axes -->
    <line x1="${PAD_L}" y1="${PAD_T}" x2="${PAD_L}" y2="${PAD_T + plotH}"
          stroke="var(--border)" stroke-width="0.5"/>
    <line x1="${PAD_L}" y1="${PAD_T + plotH}" x2="${W - PAD_R}" y2="${PAD_T + plotH}"
          stroke="var(--border)" stroke-width="0.5"/>
    <!-- y-min label -->
    <text x="${PAD_L - 4}" y="${(ty(0) + 3).toFixed(1)}"
          font-size="8" fill="var(--text-secondary)" text-anchor="end">0°</text>
    <!-- grid lines + y labels -->
    ${gridLines}
    <!-- x labels -->
    ${xTicks}
    <!-- firing curve -->
    <polyline points="${pts.join(' ')}"
              fill="none" stroke="var(--accent)" stroke-width="2"
              stroke-linejoin="round" stroke-linecap="round"/>
    <!-- peak marker -->
    ${peakMarker}
  `;
}

// ── Bootstrap ─────────────────────────────────────────────────────────────
render();
document.querySelector('#seg-body .seg-row input')?.focus();
</script>
</body>
</html>
